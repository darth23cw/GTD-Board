<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo Board</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;
  --surface:#ffffff;
  --surface2:#f5f5f7;
  --divider:#e8e8ed;
  --divider2:#d2d2d7;
  --text:#1d1d1f;
  --muted:#6e6e73;
  --hint:#c7c7cc;
  --accent:#0066cc;
  --accent-soft:#e8f0fe;
  --tag:#f59e0b;
  --r:6px;--rl:10px;
  --font:"Helvetica Neue",Helvetica,Arial,sans-serif;
  --col-label-size:11px;--col-label-color:#1d1d1f;--col-label-weight:700;--col-label-align:left;
  --row-label-size:10px;--row-label-color:#1d1d1f;--row-label-weight:700;--row-label-align:center;
  --card-text-size:14px;--card-text-color:#1d1d1f;--card-text-align:left;
}

body{font-family:var(--font);background:#fff;color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px;-webkit-font-smoothing:antialiased}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:0 20px;height:48px;border-bottom:1px solid var(--divider);background:#fff;flex-shrink:0}
.app-title{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;letter-spacing:.01em;margin-right:4px}
.tabs{display:flex;gap:2px;flex:1;overflow:hidden;align-items:center}
.tab{font-family:var(--font);font-size:12px;font-weight:500;padding:5px 11px;border:1px solid transparent;border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;transition:all .12s;white-space:nowrap;user-select:none}
.tab:hover{color:var(--text);background:var(--surface2)}
.tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.tab-add{font-family:var(--font);font-size:12px;padding:5px 10px;border:1px dashed var(--divider2);border-radius:20px;background:transparent;color:var(--hint);cursor:pointer;transition:all .12s}
.tab-add:hover{color:var(--muted);border-color:var(--muted)}
.top-right{display:flex;align-items:center;gap:6px;flex-shrink:0;position:relative}
.search-wrap{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--divider);border-radius:20px;background:var(--surface2);transition:all .12s}
.search-wrap:focus-within{border-color:var(--divider2);background:#fff;box-shadow:0 0 0 3px rgba(0,102,204,.12)}
.search-inp{font-family:var(--font);font-size:12px;border:none;background:transparent;outline:none;color:var(--text);width:120px}
.search-inp::placeholder{color:var(--hint)}
.tbtn{font-family:var(--font);font-size:11px;font-weight:500;padding:5px 10px;border:1px solid var(--divider);border-radius:20px;background:#fff;color:var(--muted);cursor:pointer;transition:all .12s;white-space:nowrap}
.tbtn:hover{color:var(--text);border-color:var(--divider2);background:var(--surface2)}

/* SYNC STATUS */
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--hint);flex-shrink:0;transition:background .3s}
.sync-dot.syncing{background:#f59e0b}
.sync-dot.synced{background:#10b981}
.sync-dot.error{background:#ef4444}

/* FONT PANEL */
.font-panel{position:absolute;top:44px;right:0;background:#fff;border:1px solid var(--divider);border-radius:var(--rl);padding:16px;width:320px;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,.1);display:none}
.font-panel.open{display:block}
.fp-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px}
.fp-row{display:flex;align-items:center;gap:6px;margin-bottom:9px}
.fp-lbl{font-size:11px;color:var(--muted);flex:0 0 88px}
.fp-size{font-family:var(--font);font-size:11px;width:46px;padding:4px 5px;border:1px solid var(--divider);border-radius:5px;background:var(--surface2);color:var(--text);text-align:center}
.fp-color{width:26px;height:26px;border:1px solid var(--divider);border-radius:5px;cursor:pointer;padding:1px;flex-shrink:0}
.fp-sel{font-family:var(--font);font-size:11px;padding:4px 5px;border:1px solid var(--divider);border-radius:5px;background:var(--surface2);color:var(--text);flex:1;min-width:0}

/* BOARD */
.board-scroll{flex:1;overflow:auto;padding:0}

/* ═══ CATEGORY BOARD ═══ */
.cat-board{display:flex;align-items:stretch;min-height:calc(100vh - 49px)}
.cat-col{display:flex;flex-direction:column;flex-shrink:0;min-height:100%;position:relative;border-right:1px solid var(--divider);background:#fff}
.cat-col:last-of-type{border-right:none}
.cat-col.col-drag-over{background:#f0f7ff}
.cat-col-hdr{padding:18px 20px 8px;cursor:grab;user-select:none;border-bottom:1px solid var(--divider)}
.cat-col-hdr:active{cursor:grabbing}
.cat-col-title{font-family:var(--font);border:none;background:transparent;outline:none;width:100%;padding:0;font-size:var(--col-label-size);font-weight:var(--col-label-weight);color:var(--col-label-color);text-align:var(--col-label-align);letter-spacing:.04em;text-transform:uppercase;cursor:text}
.cat-col-title:focus{opacity:.7}
.cat-col-goal{font-family:var(--font);font-size:11px;color:var(--muted);background:transparent;border:none;outline:none;width:100%;margin-top:3px;font-style:italic;text-align:var(--col-label-align)}
.cat-col-goal::placeholder{color:var(--hint)}
.cat-col-body{flex:1}
.col-rz{position:absolute;right:-4px;top:0;bottom:0;width:8px;cursor:col-resize;z-index:10}
.col-rz::after{content:'';position:absolute;left:3px;top:50%;transform:translateY(-50%);width:2px;height:20px;background:var(--divider);border-radius:2px;transition:background .12s}
.col-rz:hover::after{background:var(--divider2)}
.add-cat-col-btn{font-family:var(--font);font-size:12px;color:var(--hint);background:transparent;border:none;border-left:1px dashed var(--divider);padding:18px 20px;cursor:pointer;white-space:nowrap;transition:color .1s;align-self:flex-start;min-height:80px}
.add-cat-col-btn:hover{color:var(--muted)}

/* TASK ROW */
.task{display:flex;align-items:flex-start;padding:5px 8px 5px 2px;min-height:36px;position:relative;border-bottom:1px solid var(--divider);background:#fff;cursor:default}
.task:hover{background:#fafafa}
.task.dg-top::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);z-index:2}
.task.dg-bot::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--accent);z-index:2}
.task-chk-wrap{flex-shrink:0;width:14px;height:20px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;margin-top:1px;margin-left:1px}
.task:hover .task-chk-wrap{opacity:1}
.task.done .task-chk-wrap{opacity:1}
.task-chk{width:12px;height:12px;border:1.5px solid var(--divider2);border-radius:3px;cursor:pointer;appearance:none;-webkit-appearance:none;background:transparent;position:relative;flex-shrink:0}
.task-chk:checked{background:transparent;border-color:transparent}
.task-chk:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--hint);font-weight:700;line-height:1}
.task-txt{font-size:var(--card-text-size);color:var(--card-text-color);outline:none;border:none;background:transparent;font-family:var(--font);flex:1;min-width:0;cursor:text;text-align:left;white-space:pre-wrap;word-break:break-word;overflow:visible;padding:0 0 0 2px;line-height:1.45}
.task.done .task-txt{color:var(--hint);text-decoration:line-through}
.task-actions{display:flex;align-items:center;gap:3px;margin-left:4px;flex-shrink:0;padding-top:1px}
.task-star{background:none;border:none;cursor:pointer;font-size:12px;line-height:1;padding:0;color:var(--hint);transition:color .1s,opacity .1s;opacity:0}
.task:hover .task-star{opacity:1}
.task-star.on{color:var(--tag);opacity:1}
.task-x{background:none;border:none;color:var(--hint);cursor:pointer;font-size:14px;line-height:1;padding:0;opacity:0;transition:opacity .1s}
.task:hover .task-x{opacity:1}
.task-x:hover{color:var(--text)}
.cat-col-ghost{display:block;min-height:60px;cursor:text;width:100%}
.cat-col-inp{font-family:var(--font);font-size:var(--card-text-size);border:none;border-bottom:2px solid var(--accent);outline:none;width:calc(100% - 20px);margin:5px 10px;padding:4px 0;background:transparent;color:var(--text);display:none}

/* ═══ GRID (STATUS + SCHEDULE) ═══ */
.grid-wrap{display:inline-flex;flex-direction:column;min-width:max-content}
.grid-hdr-row{display:flex;position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--divider)}
.grid-corner{flex-shrink:0;background:#fff;border-right:1px solid var(--divider);position:relative}
.grid-corner-rz{position:absolute;right:-4px;top:0;bottom:0;width:8px;cursor:col-resize;z-index:30}
.grid-corner-rz::after{content:'';position:absolute;left:3px;top:50%;transform:translateY(-50%);width:2px;height:16px;background:var(--divider);border-radius:2px;transition:background .12s}
.grid-corner-rz:hover::after{background:var(--divider2)}
.grid-col-hdr{display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--divider);background:#fff;position:relative;cursor:grab;user-select:none}
.grid-col-hdr:last-of-type{border-right:none}
.grid-col-hdr.dragging-col{opacity:.4}
.grid-col-hdr-inner{display:flex;align-items:center;gap:6px;padding:12px 16px 8px}
.grid-col-name{font-family:var(--font);border:none;background:transparent;outline:none;flex:1;min-width:0;padding:0;font-size:var(--col-label-size);font-weight:var(--col-label-weight);color:var(--col-label-color);text-align:var(--col-label-align);letter-spacing:.04em;text-transform:uppercase;cursor:text}
.grid-col-name:focus{opacity:.7}
.grid-col-x{background:none;border:none;color:var(--hint);cursor:pointer;font-size:13px;line-height:1;padding:0;opacity:0;flex-shrink:0}
.grid-col-hdr-inner:hover .grid-col-x{opacity:1}
.grid-col-x:hover{color:var(--text)}
.grid-col-goal-row{padding:0 16px 8px}
.grid-col-goal-inp{font-family:var(--font);font-size:11px;color:var(--muted);background:transparent;border:none;outline:none;width:100%;font-style:italic;text-align:var(--col-label-align)}
.grid-col-goal-inp::placeholder{color:var(--hint)}
.grid-col-rz{position:absolute;right:-4px;top:0;bottom:0;width:8px;cursor:col-resize;z-index:10}
.grid-col-rz::after{content:'';position:absolute;left:3px;top:50%;transform:translateY(-50%);width:2px;height:16px;background:var(--divider);border-radius:2px;transition:background .12s}
.grid-col-rz:hover::after{background:var(--divider2)}
.add-grid-col-btn{font-family:var(--font);font-size:18px;color:var(--hint);background:transparent;border:none;padding:12px 16px;cursor:pointer;transition:color .1s;align-self:center;line-height:1}
.add-grid-col-btn:hover{color:var(--muted)}

/* GRID ROWS */
.grid-rows{display:flex;flex-direction:column}
.grid-row{display:flex;border-bottom:1px solid var(--divider);position:relative;overflow:visible}
.grid-row-label{flex-shrink:0;background:#fff;border-right:1px solid var(--divider);position:relative;display:flex;flex-direction:column}
.grid-row-label-inner{display:flex;align-items:center;justify-content:space-between;padding:6px 6px 6px 8px;gap:3px;flex:1}
.grid-row-name{font-family:var(--font);border:none;background:transparent;outline:none;flex:1;padding:0;writing-mode:vertical-rl;transform:rotate(180deg);cursor:text;text-align:var(--row-label-align);min-height:32px;font-size:var(--row-label-size);font-weight:var(--row-label-weight);color:var(--row-label-color);letter-spacing:.04em;text-transform:uppercase}
.grid-row-x{background:none;border:none;color:var(--hint);cursor:pointer;font-size:13px;line-height:1;padding:0;opacity:0}
.grid-row-label-inner:hover .grid-row-x{opacity:1}
.grid-row-x:hover{color:var(--text)}
.grid-row-rz{position:absolute;bottom:-5px;left:0;right:0;height:10px;cursor:row-resize;z-index:15}
.grid-row-rz::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);height:2px;width:18px;background:var(--divider);border-radius:2px;transition:background .12s}
.grid-row-rz:hover::after{background:var(--divider2)}
.add-grid-row-btn{font-family:var(--font);font-size:12px;color:var(--hint);background:transparent;border:none;padding:10px 16px;cursor:pointer;transition:color .1s;text-align:left}
.add-grid-row-btn:hover{color:var(--muted)}

/* GRID CELLS */
.grid-cells{display:flex;flex:1;background:#fff}
.grid-cell{flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--divider);background:#fff;overflow-y:auto}
.grid-cell:last-child{border-right:none}
.grid-cell.drag-over{background:#f0f7ff}

/* SCARD */
.scard{display:flex;align-items:flex-start;padding:5px 8px 5px 2px;min-height:36px;border-bottom:1px solid var(--divider);background:#fff;position:relative;flex-shrink:0;cursor:default}
.scard:hover{background:#fafafa}
.scard.dg-top::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);z-index:2}
.scard.dg-bot::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--accent);z-index:2}
.scard-chk-wrap{flex-shrink:0;width:14px;height:20px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;margin-top:1px;margin-left:1px}
.scard:hover .scard-chk-wrap{opacity:1}
.scard.done .scard-chk-wrap{opacity:1}
.scard-chk{width:12px;height:12px;border:1.5px solid var(--divider2);border-radius:3px;cursor:pointer;appearance:none;-webkit-appearance:none;background:transparent;position:relative;flex-shrink:0}
.scard-chk:checked{background:transparent;border-color:transparent}
.scard-chk:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--hint);font-weight:700;line-height:1}
.scard.done .scard-txt{text-decoration:line-through;color:var(--hint)}
.scard-txt{font-size:var(--card-text-size);color:var(--card-text-color);flex:1;min-width:0;outline:none;border:none;background:transparent;font-family:var(--font);cursor:text;text-align:left;white-space:pre-wrap;word-break:break-word;overflow:visible;padding:0 0 0 2px;line-height:1.45}
.scard-txt:focus{white-space:pre-wrap;}
.scard-actions{display:flex;align-items:center;gap:3px;margin-left:4px;flex-shrink:0;padding-top:1px}
.scard-star{background:none;border:none;cursor:pointer;font-size:12px;line-height:1;padding:0;color:var(--hint);opacity:0;transition:color .1s,opacity .1s}
.scard:hover .scard-star{opacity:1}
.scard-star.on{color:var(--tag);opacity:1}
.scard-x{background:none;border:none;color:var(--hint);cursor:pointer;font-size:14px;line-height:1;padding:0;opacity:0}
.scard:hover .scard-x{opacity:1}
.scard-x:hover{color:var(--text)}
.cell-ghost{flex:1;min-height:40px;cursor:text;display:block}
.cell-inp{font-family:var(--font);font-size:var(--card-text-size);color:var(--text);background:#fff;border:none;border-bottom:2px solid var(--accent);outline:none;width:calc(100% - 28px);margin:5px 14px;padding:4px 0;flex-shrink:0;display:none}

/* Context menu */
.ctx-menu{position:fixed;background:#fff;border:1px solid var(--divider);border-radius:var(--r);padding:4px 0;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,.12);min-width:160px;display:none}
.ctx-menu.open{display:block}
.ctx-item{font-family:var(--font);font-size:12px;padding:7px 14px;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:8px;white-space:nowrap}
.ctx-item:hover{background:var(--surface2)}
.ctx-sep{height:1px;background:var(--divider);margin:4px 0}
.ctx-swatches{display:flex;flex-wrap:wrap;gap:5px;padding:7px 14px}
.ctx-swatch{width:18px;height:18px;border-radius:3px;cursor:pointer;border:1px solid rgba(0,0,0,.1);flex-shrink:0;transition:transform .1s}
.ctx-swatch:hover{transform:scale(1.2)}
.ctx-swatch.clear{background:#fff;border:1px dashed var(--divider2);position:relative}
.ctx-swatch.clear::after{content:'×';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--hint)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.12);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-bg.open{display:flex}
.modal{background:#fff;border:1px solid var(--divider);border-radius:var(--rl);padding:22px;width:290px;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.modal-lbl{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.modal-inp{font-family:var(--font);font-size:14px;border:1px solid var(--divider);border-radius:var(--r);padding:8px 10px;outline:none;width:100%;background:var(--surface2);color:var(--text)}
.modal-inp:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(0,102,204,.12)}
.modal-row{display:flex;gap:8px;justify-content:flex-end}
.type-row{display:flex;gap:6px;flex-wrap:wrap}
.type-btn{font-family:var(--font);font-size:11px;font-weight:500;padding:5px 10px;border:1px solid var(--divider);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;flex:1;text-align:center;transition:all .12s}
.type-btn.sel{background:var(--text);color:#fff;border-color:var(--text)}
/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-family:var(--font);font-size:12px;font-weight:500;padding:8px 16px;border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:400;white-space:nowrap}
.toast.show{opacity:1}
.search-hl{background:#fff176;border-radius:2px}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;height:100vh;position:relative">
<div class="topbar">
  <span class="app-title">Board</span>
  <div class="tabs" id="tabs-bar"></div>
  <div class="top-right">
    <div class="search-wrap">
      <span style="color:var(--hint);font-size:14px">⌕</span>
      <input class="search-inp" id="search-inp" placeholder="Search…" oninput="doSearch(this.value)">
    </div>
    <div class="sync-dot" id="sync-dot" title="Sync status"></div>
    <button class="tbtn" id="btn-font" onclick="toggleFP()">Aa</button>
    <button class="tbtn" onclick="exportData()">export</button>
    <button class="tbtn" onclick="document.getElementById('imp-inp').click()">import</button>
    <input type="file" id="imp-inp" accept=".json" style="display:none" onchange="importData(event)">
    <div class="font-panel" id="font-panel">
      <div class="fp-title" id="fp-tab-name">Font Settings</div>
      <div class="fp-row"><span class="fp-lbl">Col label</span><input class="fp-size" type="number" min="8" max="24" id="fp-cs" value="11" oninput="applyFS()"><input class="fp-color" type="color" id="fp-cc" value="#1d1d1f" oninput="applyFS()"><select class="fp-sel" id="fp-cw" onchange="applyFS()"><option value="400">Regular</option><option value="500">Medium</option><option value="600">SemiBold</option><option value="700" selected>Bold</option></select><select class="fp-sel" id="fp-ca" onchange="applyFS()"><option value="left" selected>Left</option><option value="center">Center</option><option value="right">Right</option></select></div>
      <div class="fp-row"><span class="fp-lbl">Row label</span><input class="fp-size" type="number" min="8" max="24" id="fp-rs" value="10" oninput="applyFS()"><input class="fp-color" type="color" id="fp-rc" value="#1d1d1f" oninput="applyFS()"><select class="fp-sel" id="fp-rw" onchange="applyFS()"><option value="400">Regular</option><option value="500">Medium</option><option value="600">SemiBold</option><option value="700" selected>Bold</option></select><select class="fp-sel" id="fp-ra" onchange="applyFS()"><option value="left">Left</option><option value="center" selected>Center</option><option value="right">Right</option></select></div>
      <div class="fp-row"><span class="fp-lbl">Card text</span><input class="fp-size" type="number" min="8" max="24" id="fp-ts" value="14" oninput="applyFS()"><input class="fp-color" type="color" id="fp-tc" value="#1d1d1f" oninput="applyFS()"><select class="fp-sel" id="fp-ta" onchange="applyFS()" style="margin-left:auto"><option value="left" selected>Left</option><option value="center">Center</option><option value="right">Right</option></select></div>
    </div>
  </div>
</div>
<div class="board-scroll" id="board-scroll"><div id="board"></div></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-lbl" id="modal-lbl">New</div>
    <input class="modal-inp" id="modal-inp" placeholder="name…">
    <div class="type-row" id="type-row" style="display:none">
      <button class="type-btn sel" id="type-cat" onclick="selType('cat')">Projects</button>
      <button class="type-btn" id="type-status" onclick="selType('status')">Action Plan</button>
      <button class="type-btn" id="type-schedule" onclick="selType('schedule')">Schedule</button>
    </div>
    <div class="modal-row">
      <button class="tbtn" onclick="closeModal()">cancel</button>
      <button class="tbtn" style="color:var(--text);border-color:var(--divider2);font-weight:700" onclick="confirmModal()">add</button>
    </div>
  </div>
</div>

// ── Called by Firebase module once remote data is available
window._initWithRemoteState = function(remote){
  if(remote){
    state = remote;
  } else {
    // No remote data yet — check localStorage for migration, else use defaults
    try{const s=localStorage.getItem('brdvb');if(s){state=JSON.parse(s);}else throw 1;}
    catch{state={tabs:JSON.parse(JSON.stringify(INIT))};}
  }
  normalizeState();
  activeTabId = state.tabs[0].id;
  _remoteStateReady = true;
  render();
};

// ── Called by live Firestore listener when another device saves
window._mergeRemoteState = function(remote){
  if(!remote) return;
  // Only update if we're not the ones currently editing
  // Simple strategy: replace state and re-render (preserves last-write-wins)
  state = remote;
  normalizeState();
  render();
};

function normalizeState(){
  if(!state.tabs) state.tabs = JSON.parse(JSON.stringify(INIT));
  state.tabs.forEach(tab=>{
    if(!tab.fontSettings)tab.fontSettings={...DEF_FS};
    else Object.keys(DEF_FS).forEach(k=>{if(tab.fontSettings[k]===undefined)tab.fontSettings[k]=DEF_FS[k];});
    if(tab.type==='cat')tab.cols.forEach(col=>{
      if(!col.goal)col.goal='';
      col.tasks.forEach(t=>{if(t.tagged===undefined)t.tagged=false;if(t.done===undefined)t.done=false;if(!t.bgColor)t.bgColor='';if(!t.textColor)t.textColor='';});
    });
    if(tab.type==='status'){
      if(!tab.rowLabelW)tab.rowLabelW=90;
      tab.cols.forEach(c=>{if(!c.goal)c.goal='';if(!c.bgColor)c.bgColor='';});
      tab.rows.forEach(row=>Object.values(row.cells).forEach(arr=>arr.forEach(c=>{
        if(c.tagged===undefined)c.tagged=false;if(c.done===undefined)c.done=false;
        if(!c.bgColor)c.bgColor='';if(!c.textColor)c.textColor='';
      })));
    }
    if(tab.type==='schedule'){
      if(!tab.cells)tab.cells={};
      tab.cols.forEach(c=>{if(!c.bgColor)c.bgColor='';});
      Object.values(tab.cells).forEach(arr=>arr.forEach(c=>{
        if(!c.bgColor)c.bgColor='';if(!c.textColor)c.textColor='';
      }));
    }
  });
  if(!state.tabs.find(t=>t.type==='schedule')){state.tabs.push(JSON.parse(JSON.stringify(INIT[2])));}
}

  // Save to localStorage as a fast local backup
  localStorage.setItem('brdvb', JSON.stringify(state));

}

/* TAGGED SYNC */
function syncTagged(){
  const sched=getSchedTab();if(!sched)return;
  const weekColId='sw',morphRowId=sched.rows[0]?.id;if(!morphRowId)return;
  const key=morphRowId+'_'+weekColId;
  if(!sched.cells[key])sched.cells[key]=[];
  const tagged=[];
  state.tabs.forEach(tab=>{
    if(tab.type==='cat')tab.cols.forEach(col=>col.tasks.forEach(t=>{if(t.tagged)tagged.push({id:t.id,text:t.text,done:t.done});}));
    if(tab.type==='status')tab.rows.forEach(row=>Object.values(row.cells).forEach(arr=>arr.forEach(c=>{if(c.tagged)tagged.push({id:c.id,text:c.text,done:c.done});})));
  });
  const taggedIds=new Set(tagged.map(x=>x.id));
  Object.values(sched.cells).forEach(arr=>arr.filter(c=>c.synced).forEach(c=>{const src=tagged.find(t=>t.id===c.id);if(src){c.text=src.text;c.done=src.done;}}));
  Object.keys(sched.cells).forEach(k=>{sched.cells[k]=sched.cells[k].filter(c=>!c.synced||taggedIds.has(c.id));});
  const existingIds=new Set(Object.values(sched.cells).flat().map(c=>c.id));
  tagged.forEach(item=>{if(!existingIds.has(item.id))sched.cells[key].push({id:item.id,text:item.text,done:item.done,synced:true,tagged:true,bgColor:'',textColor:''});});
}

    if(tab.type==='schedule')Object.values(tab.cells).forEach(arr=>{const t=arr.find(x=>x.id===id);if(t)t.done=done;});
  });
}

function deleteFromOriginalBoard(id){

let dragTabId=null;
function renderTabs(){
  const bar=document.getElementById('tabs-bar');bar.innerHTML='';

    const b=document.createElement('button');
    b.className='tab'+(t.id===activeTabId?' active':'');
    b.textContent=t.name;b.draggable=true;b.dataset.tabId=t.id;
    b.onclick=()=>{activeTabId=t.id;document.getElementById('font-panel').classList.remove('open');render();};
    b.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();openTabCtx(e,t);});
    b.addEventListener('dragstart',e=>{dragTabId=t.id;b.style.opacity='.4';e.dataTransfer.effectAllowed='move';});
    b.addEventListener('dragend',()=>{b.style.opacity='1';dragTabId=null;bar.querySelectorAll('.tab').forEach(el=>{el.style.borderLeft='';el.style.borderRight='';});});
    b.addEventListener('dragover',e=>{
      if(!dragTabId||dragTabId===t.id)return;e.preventDefault();e.stopPropagation();
      bar.querySelectorAll('.tab').forEach(el=>{el.style.borderLeft='';el.style.borderRight='';});
      const r=b.getBoundingClientRect();const isLeft=e.clientX<r.left+r.width/2;
      if(isLeft)b.style.borderLeft='2px solid var(--accent)';else b.style.borderRight='2px solid var(--accent)';
    });
    b.addEventListener('dragleave',()=>{b.style.borderLeft='';b.style.borderRight='';});
    b.addEventListener('drop',e=>{
      e.preventDefault();e.stopPropagation();b.style.borderLeft='';b.style.borderRight='';
      if(!dragTabId||dragTabId===t.id)return;
      const fromIdx=state.tabs.findIndex(x=>x.id===dragTabId),toIdx=state.tabs.findIndex(x=>x.id===t.id);
      if(fromIdx<0||toIdx<0)return;
      const r=b.getBoundingClientRect();const insertAfter=e.clientX>=r.left+r.width/2;
      const[moved]=state.tabs.splice(fromIdx,1);const newTo=state.tabs.findIndex(x=>x.id===t.id);
      state.tabs.splice(insertAfter?newTo+1:newTo,0,moved);save();renderTabs();
    });
    bar.appendChild(b);
  });
  const a=document.createElement('button');a.className='tab-add';a.textContent='+ tab';a.onclick=()=>openModal('tab');bar.appendChild(a);
}

  menu.appendChild(deleteItem);
  menu.classList.add('open');menu.style.display='block';
  const vw=window.innerWidth,vh=window.innerHeight;let x=e.clientX,y=e.clientY;menu.style.left=x+'px';menu.style.top=y+'px';
  requestAnimationFrame(()=>{const r=menu.getBoundingClientRect();if(r.right>vw)menu.style.left=Math.max(0,x-r.width)+'px';if(r.bottom>vh)menu.style.top=Math.max(0,y-r.height)+'px';});
}

  const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');

function makeSchedCard(card,key,tab,row,col){
  const el=document.createElement('div');el.className='scard'+(card.done?' done':'');el.draggable=true;if(card.bgColor)el.style.backgroundColor=card.bgColor;
  el.addEventListener('contextmenu',e=>{openCtx(e,'schedCard',card,(bg,tc)=>{if(bg!==null)card.bgColor=bg;if(tc!==null)card.textColor=tc;save();render();});});
  el.addEventListener('dragstart',e=>{dragItem={type:'schedCard',id:card.id,key};e.dataTransfer.effectAllowed='move';e.stopPropagation();});
  el.addEventListener('dragend',()=>{dragItem=null;document.querySelectorAll('.scard').forEach(c=>c.classList.remove('dg-top','dg-bot'));});
  el.addEventListener('dragover',e=>{if(!dragItem||dragItem.type!=='schedCard'||dragItem.id===card.id)return;e.preventDefault();e.stopPropagation();document.querySelectorAll('.scard').forEach(c=>c.classList.remove('dg-top','dg-bot'));el.classList.add(e.clientY<el.getBoundingClientRect().top+el.getBoundingClientRect().height/2?'dg-top':'dg-bot');});
  el.addEventListener('dragleave',()=>el.classList.remove('dg-top','dg-bot'));
  el.addEventListener('drop',e=>{
    e.preventDefault();e.stopPropagation();el.classList.remove('dg-top','dg-bot');
    if(!dragItem||dragItem.type!=='schedCard'||dragItem.id===card.id)return;const src=tab.cells[dragItem.key]||[];const fi=src.findIndex(c=>c.id===dragItem.id);if(fi<0)return;const[moved]=src.splice(fi,1);if(!tab.cells[key])tab.cells[key]=[];
    const ti=tab.cells[key].findIndex(c=>c.id===card.id);tab.cells[key].splice(e.clientY<el.getBoundingClientRect().top+el.getBoundingClientRect().height/2?ti:ti+1,0,moved);save();render();
  });
  const chkWrap=document.createElement('div');chkWrap.className='scard-chk-wrap';const chk=document.createElement('input');chk.type='checkbox';chk.className='scard-chk';chk.checked=card.done;
  chk.addEventListener('mousedown',e=>e.stopPropagation());chk.addEventListener('change',()=>{card.done=chk.checked;if(card.synced)syncDoneBack(card.id,card.done);save();render();});chkWrap.appendChild(chk);
  const txt=document.createElement('div');txt.className='scard-txt';txt.contentEditable=card.synced?'false':'true';txt.textContent=card.text;txt.spellcheck=false;if(card.textColor)txt.style.color=card.textColor;
  txt.addEventListener('mousedown',e=>e.stopPropagation());
  if(!card.synced){
    txt.addEventListener('blur',()=>{const v=txt.textContent.trim();if(!v){const i=(tab.cells[key]||[]).findIndex(c=>c.id===card.id);if(i>=0){tab.cells[key].splice(i,1);save();render();}return;}card.text=v;save();});
    txt.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();const v=txt.textContent.trim();if(v)card.text=v;save();txt.blur();}});
  }
  const acts=document.createElement('div');acts.className='scard-actions';
  const star=document.createElement('button');star.className='scard-star'+(card.tagged?' on':'');star.textContent='★';star.addEventListener('mousedown',e=>e.stopPropagation());
  star.onclick=()=>{card.tagged=!card.tagged;if(card.synced){syncTaggedBack(card.id,card.tagged);if(!card.tagged){removeFromAllSchedCells(card.id);save();render();return;}}save();render();showToast(card.tagged?'Tagged ★':'Untagged');};
  const xb=document.createElement('button');xb.className='scard-x';xb.textContent='×';xb.addEventListener('mousedown',e=>e.stopPropagation());
  xb.onclick=()=>{if(card.synced){deleteFromOriginalBoard(card.id);removeFromAllSchedCells(card.id);}else{const i=(tab.cells[key]||[]).findIndex(c=>c.id===card.id);if(i>=0)tab.cells[key].splice(i,1);}save();render();};
  acts.appendChild(star);acts.appendChild(xb);el.appendChild(chkWrap);el.appendChild(txt);el.appendChild(acts);return el;
}

function makeRzH(onResize,getW){
  const rh=document.createElement('div');rh.className='col-rz';
  rh.addEventListener('mousedown',e=>{e.preventDefault();const sx=e.clientX,sw=getW();const mm=mv=>{onResize(Math.max(80,Math.min(500,sw+(mv.clientX-sx))));};const mu=()=>{save();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
  return rh;
}

/* MODAL */
function selType(t){newTabType=t;['cat','status','schedule'].forEach(tt=>{const b=document.getElementById('type-'+tt);if(b)b.classList.toggle('sel',tt===t);});}
function openModal(mode){
  modalMode=mode;
  const lbl={tab:'New Tab',col:'New Project',scol:'New Stage',srow:'New Group','sched-col':'New Day','sched-row':'New Time Block'};
  document.getElementById('modal-lbl').textContent=lbl[mode]||'New';document.getElementById('modal-inp').value='';
  document.getElementById('type-row').style.display=mode==='tab'?'flex':'none';
  newTabType='cat';selType('cat');document.getElementById('modal-bg').classList.add('open');setTimeout(()=>document.getElementById('modal-inp').focus(),40);
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
function confirmModal(){
  const v=document.getElementById('modal-inp').value.trim();if(!v)return;const tab=getTab();
  if(modalMode==='tab'){const nt={id:uid(),name:v,type:newTabType,fontSettings:{...DEF_FS}};if(newTabType==='cat'){nt.colW=200;nt.cols=[];}if(newTabType==='status'){nt.colW=170;nt.rowLabelW=90;nt.cols=[];nt.rows=[];}if(newTabType==='schedule'){nt.colW=155;nt.rowLabelW=80;nt.cols=JSON.parse(JSON.stringify(SCHED_COLS));nt.rows=JSON.parse(JSON.stringify(SCHED_ROWS));nt.cells=mkCells(nt.cols,nt.rows);}state.tabs.push(nt);activeTabId=nt.id;}
  else if(modalMode==='col'){tab.cols.push({id:uid(),name:v,goal:'',tasks:[],bgColor:'',textColor:''});}
  else if(modalMode==='scol'){const cs=['#0066cc','#cc3333','#cc8800','#cc6600','#1a8a1a'];const nc={id:uid(),name:v,color:cs[tab.cols.length%cs.length],goal:'',bgColor:''};tab.cols.push(nc);tab.rows.forEach(r=>{r.cells[nc.id]=[];});}
  else if(modalMode==='srow'){const cells={};tab.cols.forEach(c=>{cells[c.id]=[];});tab.rows.push({id:uid(),name:v,rowH:140,cells});}
  else if(modalMode==='sched-col'){const nc={id:uid(),name:v,color:'#6e6e73',bgColor:''};tab.cols.push(nc);tab.rows.forEach(r=>{tab.cells[r.id+'_'+nc.id]=[];});}
  else if(modalMode==='sched-row'){const nr={id:uid(),name:v,rowH:140};tab.rows.push(nr);tab.cols.forEach(c=>{tab.cells[nr.id+'_'+c.id]=[];});}
  save();render();closeModal();
}
document.getElementById('modal-inp').addEventListener('keydown',e=>{if(e.key==='Enter')confirmModal();if(e.key==='Escape')closeModal();});
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.addEventListener('click',e=>{const p=document.getElementById('font-panel');if(p.classList.contains('open')&&!p.contains(e.target)&&!document.getElementById('btn-font').contains(e.target))p.classList.remove('open');});

/* EXPORT / IMPORT */
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='todo-board-data.json';a.click();URL.revokeObjectURL(a.href);showToast('Exported ✓');}
function importData(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.tabs)throw 1;state=d;save();activeTabId=state.tabs[0].id;render();showToast('Imported ✓');}catch{alert('Invalid file.');}};reader.readAsText(file);e.target.value='';}
</script>
